        }

            max-width: 1220px;

            flex-direction: column;
            gap: 42px;

            position: relative;
            padding: 30px;
            border-radius: 18px;

            color: var(--theme-text, #0f172a);
            box-shadow: 0 34px 60px rgba(15, 23, 42, 0.3);

        .theme-block:hover {

            border-radius: 14px;
            margin-bottom: 26px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .theme-header-top {

            align-items: baseline;
            gap: 12px;

        td {

        }

        tbody tr:hover td {

        }

            align-items: center;

            height: 20px;
            border-radius: 6px;
            background: rgba(148, 163, 184, 0.25);
        }

            align-items: center;
            justify-content: center;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(148, 163, 184, 0.18);

        }

        .prob-cell:hover {

        }

        .prob-value {
            display: inline-block;
            min-width: 4ch;
        }

        .matrix-table {
            font-size: 0.85rem;
        }

            text-align: left;
            position: sticky;
            left: 0;
            background: inherit;

            font-weight: 600;
            border-bottom: 1px solid var(--theme-table-border, rgba(15, 23, 42, 0.08));

        }

            }

            const clamp = (value, min, max) => Math.min(max, Math.max(min, value));

            function hexToRgb(hex) {
                const clean = hex.replace('#', '');
                const bigint = parseInt(clean, 16);
                return {
                    r: (bigint >> 16) & 255,
                    g: (bigint >> 8) & 255,
                    b: bigint & 255
                };
            }

            function rgbToCss({ r, g, b }) {
                return `rgb(${r}, ${g}, ${b})`;
            }

            function interpolateColor(colorA, colorB, t) {
                return {
                    r: Math.round(colorA.r + (colorB.r - colorA.r) * t),
                    g: Math.round(colorA.g + (colorB.g - colorA.g) * t),
                    b: Math.round(colorA.b + (colorB.b - colorA.b) * t)
                };
            }

            function blendColors(colorA, colorB, factor) {
                const f = clamp(factor, 0, 1);
                return {
                    r: Math.round(colorA.r + (colorB.r - colorA.r) * f),
                    g: Math.round(colorA.g + (colorB.g - colorA.g) * f),
                    b: Math.round(colorA.b + (colorB.b - colorA.b) * f)
                };
            }

            function computeLuminance({ r, g, b }) {
                const channels = [r, g, b].map(value => {
                    const channel = value / 255;
                    return channel <= 0.03928
                        ? channel / 12.92
                        : Math.pow((channel + 0.055) / 1.055, 2.4);
                });
                return 0.2126 * channels[0] + 0.7152 * channels[1] + 0.0722 * channels[2];
            }

            function processTheme(theme) {
                const processed = { ...theme };
                processed.stops = theme.colorStops.map(stop => ({
                    stop: clamp(stop.stop, 0, 1),
                    color: hexToRgb(stop.color)
                }));
                processed.neutralRgb = hexToRgb(theme.neutral || '#ffffff');
                processed.tableMix = {
                    min: clamp(theme.tableMix?.min ?? 0.55, 0, 1),
                    max: clamp(theme.tableMix?.max ?? 0.95, 0, 1),
                    power: Math.max(theme.tableMix?.power ?? 0.6, 0.1)
                };
                processed.matrixMix = {
                    min: clamp(theme.matrixMix?.min ?? 0.4, 0, 1),
                    max: clamp(theme.matrixMix?.max ?? 0.9, 0, 1),
                    power: Math.max(theme.matrixMix?.power ?? 0.65, 0.1)
                };
                processed.lightText = theme.lightText || '#ffffff';
                processed.darkText = theme.darkText || '#111827';
                processed.textThreshold = theme.textThreshold ?? 0.55;
                return processed;
            }

            function getProbabilityColor(probability, theme) {
                const clamped = clamp(probability, 0, 1);
                const stops = theme.stops;
                if (clamped <= stops[0].stop) {
                    return stops[0].color;
                }
                if (clamped >= stops[stops.length - 1].stop) {
                    return stops[stops.length - 1].color;
                }
                for (let i = 0; i < stops.length - 1; i++) {
                    const current = stops[i];
                    const next = stops[i + 1];
                    if (clamped >= current.stop && clamped <= next.stop) {
                        const span = next.stop - current.stop || 1;
                        const localT = (clamped - current.stop) / span;
                        return interpolateColor(current.color, next.color, localT);
                    }
                }
                return stops[stops.length - 1].color;
            }

            function selectTextColor(color, theme) {
                const luminance = computeLuminance(color);
                return luminance > theme.textThreshold ? theme.darkText : theme.lightText;
            }

            function getProbabilityCellStyle(probability, theme, mode = 'table') {
                const clamped = clamp(probability, 0, 1);
                const mixConfig = mode === 'matrix' ? theme.matrixMix : theme.tableMix;
                const mixFactor = clamp(
                    mixConfig.min + (mixConfig.max - mixConfig.min) * Math.pow(clamped, mixConfig.power),
                    0,
                    1
                );
                const baseColor = getProbabilityColor(clamped, theme);
                const backgroundColor = blendColors(theme.neutralRgb, baseColor, mixFactor);
                return {
                    background: rgbToCss(backgroundColor),
                    textColor: selectTextColor(backgroundColor, theme)

            }

            function formatMatrixProbability(value) {
                if (value <= 0) {
                    return '0';
                }
                if (value < 0.01) {
                    return '<1';
                }
                return `${Math.round(value * 100)}`;
            }

            function createProbabilityCell(probability, theme) {
                const cell = document.createElement('td');
                cell.className = 'prob-cell';
                const { background, textColor } = getProbabilityCellStyle(probability, theme, 'table');
                cell.style.backgroundColor = background;
                cell.style.color = textColor;
                cell.textContent = formatTableProbability(probability);
                return cell;
            }

            function createMatrixCell(probability, theme) {
                const cell = document.createElement('td');
                if (probability <= 0) {
                    cell.textContent = '0';
                    cell.classList.add('prob-zero');
                    return cell;
                }
                const { background, textColor } = getProbabilityCellStyle(probability, theme, 'matrix');
                cell.style.backgroundColor = background;
                cell.style.color = textColor;
                cell.textContent = formatMatrixProbability(probability);
                return cell;
            }

            function createSummarySection() {
                const summary = document.createElement('div');
                summary.className = 'summary-stats';
                summaryStats.forEach(item => {
                    const box = document.createElement('div');
                    box.className = 'stat-box';
                    const label = document.createElement('div');
                    label.className = 'stat-label';
                    label.textContent = item.label;
                    const value = document.createElement('div');
                    value.className = 'stat-value';
                    value.textContent = item.value;
                    const subtext = document.createElement('div');
                    subtext.className = 'stat-subtext';
                    subtext.textContent = item.subtext;
                    box.appendChild(label);
                    box.appendChild(value);
                    box.appendChild(subtext);
                    summary.appendChild(box);
                });
                return summary;
            }

            function createProjectionTable(theme) {
                const container = document.createElement('div');
                container.className = 'table-container';
                const table = document.createElement('table');
                const thead = document.createElement('thead');
                const headerRow = document.createElement('tr');
                ['Pos', 'Team', 'Current ELO', 'Record', 'Projected Wins'].forEach(label => {
                    const th = document.createElement('th');
                    th.textContent = label;
                    headerRow.appendChild(th);
                });
                probabilityColumns.forEach(column => {
                    const th = document.createElement('th');
                    th.textContent = column.label;
                    headerRow.appendChild(th);
                });
                thead.appendChild(headerRow);
                const tbody = document.createElement('tbody');
                sampleTeams.forEach(team => {
                    const row = document.createElement('tr');

                    const posCell = document.createElement('td');
                    const posBadge = document.createElement('span');
                    posBadge.className = 'position';
                    if (team.position <= 8) {
                        posBadge.classList.add('top-eight');
                    }
                    posBadge.textContent = team.position;
                    posCell.appendChild(posBadge);
                    row.appendChild(posCell);

                    const teamCell = document.createElement('td');
                    const teamWrapper = document.createElement('div');
                    teamWrapper.className = 'team-cell';
                    const badge = document.createElement('span');
                    badge.className = 'team-badge';
                    teamWrapper.appendChild(badge);
                    const teamName = document.createElement('span');
                    teamName.textContent = team.team;
                    teamWrapper.appendChild(teamName);
                    teamCell.appendChild(teamWrapper);
                    row.appendChild(teamCell);

                    const eloCell = document.createElement('td');
                    eloCell.innerHTML = `<strong>${Math.round(team.currentElo)}</strong>`;
                    row.appendChild(eloCell);

                    const recordCell = document.createElement('td');
                    recordCell.textContent = team.record;
                    row.appendChild(recordCell);

                    const projectedCell = document.createElement('td');
                    projectedCell.innerHTML = `<strong>${team.projectedWins.toFixed(1)}</strong><span class=\"projected-range\">(${team.winRange.low.toFixed(1)} – ${team.winRange.high.toFixed(1)})</span>`;
                    row.appendChild(projectedCell);

                    probabilityColumns.forEach(column => {
                        row.appendChild(createProbabilityCell(team[column.key], theme));
                    });

                    tbody.appendChild(row);
                });

                table.appendChild(thead);
                table.appendChild(tbody);
                container.appendChild(table);
                return container;
            }

            function createMatrixTable(theme) {
                const container = document.createElement('div');
                container.className = 'table-container';
                const table = document.createElement('table');
                table.className = 'matrix-table';
                const thead = document.createElement('thead');
                const headerRow = document.createElement('tr');
                const teamHead = document.createElement('th');
                teamHead.textContent = 'Team';
                headerRow.appendChild(teamHead);
                ladderPositions.forEach((position, index) => {
                    const th = document.createElement('th');
                    if (index === 0) {
                        th.textContent = '1st';
                    } else if (index === 1) {
                        th.textContent = '2nd';
                    } else if (index === 2) {
                        th.textContent = '3rd';
                    } else {
                        th.textContent = `${position}th`;
                    }
                    headerRow.appendChild(th);
                });
                thead.appendChild(headerRow);
                const tbody = document.createElement('tbody');
                ladderMatrix.forEach(entry => {
                    const row = document.createElement('tr');
                    const teamCell = document.createElement('td');
                    teamCell.textContent = entry.team;
                    row.appendChild(teamCell);
                    entry.probabilities.forEach(value => {
                        row.appendChild(createMatrixCell(value, theme));
                    });
                    tbody.appendChild(row);
                });
                table.appendChild(thead);
                table.appendChild(tbody);
                container.appendChild(table);
                return container;
            }

            function applyThemeVariables(section, theme) {
                section.style.setProperty('--theme-accent', theme.accent);
                section.style.setProperty('--theme-accent-text', theme.accentText || theme.lightText);
                section.style.setProperty('--theme-background', theme.background || '#ffffff');
                section.style.setProperty('--theme-text', theme.text || '#0f172a');
                section.style.setProperty('--theme-card-bg', theme.cardBackground || '#ffffff');
                section.style.setProperty('--theme-card-text', theme.cardText || theme.text || '#0f172a');
                section.style.setProperty('--theme-muted', theme.muted || 'rgba(15,23,42,0.06)');
                section.style.setProperty('--theme-table-head-bg', theme.tableHeaderBg || 'rgba(148, 163, 184, 0.12)');
                section.style.setProperty('--theme-table-head-text', theme.tableHeaderText || theme.text || '#0f172a');
                section.style.setProperty('--theme-table-border', theme.tableBorder || 'rgba(148, 163, 184, 0.2)');
                section.style.setProperty('--theme-header-bg', theme.headerGradient || theme.accent);
                section.style.setProperty('--theme-badge-bg', theme.badgeBg || theme.accent);
                section.style.setProperty('--theme-badge-text', theme.badgeText || theme.accentText || theme.lightText);
            }

            function renderTheme(theme, index, total) {
                const section = document.createElement('section');
                section.className = 'theme-block';
                applyThemeVariables(section, theme);

                const header = document.createElement('div');
                header.className = 'theme-header';

                const headerTop = document.createElement('div');
                headerTop.className = 'theme-header-top';

                const title = document.createElement('h2');
                title.textContent = `${index + 1}. ${theme.name}`;
                headerTop.appendChild(title);

                const badge = document.createElement('span');
                badge.className = 'theme-badge';
                badge.textContent = `Palette ${index + 1} of ${total}`;
                headerTop.appendChild(badge);

                header.appendChild(headerTop);

                if (theme.keywords) {
                    const keywords = document.createElement('div');
                    keywords.className = 'theme-keywords';
                    keywords.textContent = theme.keywords;
                    header.appendChild(keywords);
                }

                if (theme.description) {
                    const description = document.createElement('p');
                    description.className = 'theme-description';
                    description.textContent = theme.description;
                    header.appendChild(description);
                }

                section.appendChild(header);

                const container = document.createElement('div');
                container.className = 'mock-container';

                const simulationCard = document.createElement('div');
                simulationCard.className = 'card simulation-card';

                const simulationHeader = document.createElement('div');
                simulationHeader.className = 'card-header';
                const simulationTitle = document.createElement('div');
                simulationTitle.className = 'card-title';
                simulationTitle.textContent = 'Season Projection (Mock Data)';
                simulationHeader.appendChild(simulationTitle);
                simulationCard.appendChild(simulationHeader);

                simulationCard.appendChild(createSummarySection());
                simulationCard.appendChild(createProjectionTable(theme));

                container.appendChild(simulationCard);

                const matrixCard = document.createElement('div');
                matrixCard.className = 'card ladder-card';
                const matrixHeader = document.createElement('div');
                matrixHeader.className = 'card-header';
                const matrixTitle = document.createElement('div');
                matrixTitle.className = 'card-title';
                matrixTitle.textContent = 'Ladder Position Probabilities (Mock Data)';
                matrixHeader.appendChild(matrixTitle);
                matrixCard.appendChild(matrixHeader);

                const matrixIntro = document.createElement('p');
                matrixIntro.style.fontSize = '0.88rem';
                matrixIntro.style.opacity = '0.7';
                matrixIntro.style.marginBottom = '16px';
                matrixIntro.textContent = 'Cells display the percentage chance of finishing in each ladder slot. Colour intensity follows the palette for this theme.';
                matrixCard.appendChild(matrixIntro);

                matrixCard.appendChild(createMatrixTable(theme));

                container.appendChild(matrixCard);

                section.appendChild(container);

                return section;
            }
            const processedThemes = themes.map(processTheme);
            const root = document.getElementById('themes-root');
            processedThemes.forEach((theme, index) => {
                root.appendChild(renderTheme(theme, index, processedThemes.length));
            });
        })();
    </script>
</body>
</html>
