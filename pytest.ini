[pytest]
# Pytest configuration for AFL predictions project

# Test discovery
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Output formatting
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Test directories
testpaths = scripts

# Markers for test categorization
markers =
    slow: marks tests as slow (may take longer to run)
    integration: marks tests as integration tests
    unit: marks tests as unit tests
    optimization: marks tests related to ELO optimization
    model: marks tests related to ELO model functionality

# Minimum Python version
minversion = 3.8
